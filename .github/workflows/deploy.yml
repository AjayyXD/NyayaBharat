name: Deploy NyayaBharat

on:
  push:
    branches:
      - main          # runs every time you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/NyayaBharat

            # Pull latest code
            git pull origin main

            # Activate venv and install any new dependencies
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Restart the backend service
            sudo systemctl restart nyayabharat

            # Confirm it's running
            sudo systemctl is-active nyayabharat